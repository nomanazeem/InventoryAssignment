spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

server:
  port: 8080

services:
  inventory:
    url: http://localhost:8081
  customer:
    url: http://localhost:8082
  payment:
    url: http://localhost:8083

resilience:
  retry:
    max-attempts: 3
    backoff: 1000
  timeout: 2000
  circuit-breaker:
    failure-threshold: 3
    wait-duration: 10000